# CI : lint + build à chaque push / PR sur main (ou master).
#
# Déploiement automatique Vercel (hors dépôt) :
# 1. Vercel → Add New Project → importer ce dépôt Git (GitHub/GitLab/Bitbucket).
# 2. Root directory : racine du repo ; Build : npm run vercel-build (déjà dans vercel.json).
# 3. Variables d’environnement : copier depuis .env.example / Vercel Settings.
# Chaque push sur main déclenche un déploiement Vercel (si le dépôt est lié) + ce CI ; les PR ont des Preview URLs.
#
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Valeurs factices uniquement pour compiler Next.js / Prisma en CI (pas de secrets réels).
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      NEXTAUTH_SECRET: ci-build-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_EMAILS: ci@example.com
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: CI <ci@example.com>
      YOUSIGN_API_KEY: ys_ci_placeholder
      YOUSIGN_ENV: sandbox
      MOLLIE_API_KEY: test_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prisma generate + Next build
        run: npm run build
