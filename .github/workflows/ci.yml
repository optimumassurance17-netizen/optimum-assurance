# CI : lint + build à chaque push / PR sur main (ou master).
#
# Déploiement automatique Vercel (hors dépôt) :
# 1. Vercel → Add New Project → importer ce dépôt Git (GitHub/GitLab/Bitbucket).
# 2. Root directory : racine du repo ; Build : npm run vercel-build (déjà dans vercel.json).
# 3. Variables d’environnement : copier depuis .env.example / Vercel Settings.
# Chaque push sur main déclenche un déploiement Vercel (si le dépôt est lié) + ce CI ; les PR ont des Preview URLs.
# Job e2e : Postgres + migrations + build + Playwright (sans .env.e2e → test admin gestion ignoré).
#
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Valeurs factices uniquement pour compiler Next.js / Prisma en CI (pas de secrets réels).
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      NEXTAUTH_SECRET: ci-build-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_EMAILS: ci@example.com
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: CI <ci@example.com>
      MOLLIE_API_KEY: test_ci_placeholder

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vérification mentions contractuelles PDF
        run: npm run test:pdf-contractual

      - name: Prisma generate + Next build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: optimum_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # 127.0.0.1 : évite ambiguïtés IPv6 sur le runner ; sslmode=disable pour Postgres service local
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/optimum_ci?sslmode=disable
      NEXTAUTH_SECRET: ci-build-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      ADMIN_EMAILS: ci@example.com
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: CI <ci@example.com>
      MOLLIE_API_KEY: test_ci_placeholder
      CI: "true"
      PLAYWRIGHT_USE_BUILD_SERVER: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Base Postgres éphémère : `db push` aligne le schéma sans historique de migrations
      # (évite les écarts baseline / shadow DB sur runner GitHub).
      # --accept-data-loss : runner non interactif ; base vide / jetable uniquement.
      - name: Prisma — pousser le schéma vers Postgres (CI e2e)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Prisma generate + Next build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright tests
        run: npx playwright test
